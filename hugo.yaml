# 山渐清的博客
baseURL: "https://JianQing-Shan.github.io/"
title: "山渐清"
theme: "PaperMod"
publishDir: "docs"
cleanDestinationDir: true   # 每次构建清掉 docs/ 旧产物，避免删稿后残留

# 关闭"系列"词条页的输出(/series/<名>/)——系列体验是 /series/ 单页主从，词条页用不到
# 仅命中 series 的 term 页：tags 词条页(/tags/<标签>/)和 /series/ 主从页都不受影响
cascade:
  - _target:
      kind: term
      path: /series/**
    build:
      render: never
locale: "zh-cn"
buildFuture: true

taxonomies:
  tag: tags
  series: series

# 文章网址只取 slug，子文件夹仅用于组织（不进 URL）
permalinks:
  posts: /posts/:slug/

# 首页额外输出 JSON：作为 PaperMod 搜索(Fuse.js)的索引
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  hideFooter: true
  mainSections: ["posts"]
  # 搜索(Fuse.js)按中文调优
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    threshold: 0.3
    minMatchCharLength: 1
    ignoreLocation: true
    keys: ["title", "summary", "content"]
  disableAnchoredHeadings: true
  ShowToc: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  profileMode:
    enabled: true
    title: "青山的博客"
    subtitle: "记录思考与故事"
    imageUrl: "/img/avatar.jpeg"
    imageWidth: 120
    imageHeight: 120
  socialIcons:
    - name: "github"
      url: "https://github.com/JianQing-Shan"

menu:
  main:
    - identifier: "posts"
      name: "文章"
      url: "/posts/"
      weight: 1
    - identifier: "series"
      name: "系列"
      url: "/series/"
      weight: 2
    - identifier: "archives"
      name: "归档"
      url: "/archives/"
      weight: 3
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 4
    - identifier: "search"
      name: "搜索"
      url: "/search/"
      weight: 5
