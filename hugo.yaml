baseURL: "https://JianQing-Shan.github.io/"
title: "山渐清"
theme: "PaperMod"
publishDir: "docs"
locale: "zh-cn"
buildFuture: true

taxonomies:
  tag: tags

# 首页额外输出 JSON：作为 PaperMod 搜索(Fuse.js)的索引
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  hideFooter: true
  mainSections: ["posts"]
  # 搜索(Fuse.js)按中文调优
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    threshold: 0.3
    minMatchCharLength: 1
    ignoreLocation: true
    keys: ["title", "summary", "content"]
  disableAnchoredHeadings: true
  ShowToc: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  profileMode:
    enabled: true
    title: "青山的博客"
    subtitle: "记录思考与故事"
    imageUrl: "/img/avatar.jpeg"
    imageWidth: 120
    imageHeight: 120
  socialIcons:
    - name: "github"
      url: "https://github.com/JianQing-Shan"

menu:
  main:
    - identifier: "posts"
      name: "文章"
      url: "/posts/"
      weight: 1
    - identifier: "search"
      name: "搜索"
      url: "/search/"
      weight: 2
    - identifier: "archives"
      name: "归档"
      url: "/archives/"
      weight: 3
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 4
    - identifier: "about"
      name: "关于"
      url: "/about/"
      weight: 5
