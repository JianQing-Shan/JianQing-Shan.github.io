(function () {
  function fromList(sel) {
    return [].map.call(document.querySelectorAll(sel), function (a) {
      return { u: a.pathname, t: (a.getAttribute('aria-label') || a.textContent || '').trim() };
    });
  }
  function ctxOf(link) {
    var card = link.closest && link.closest('.series-card-list');
    if (card) {
      return [].map.call(card.querySelectorAll('li > a'), function (a) {
        return { u: a.pathname, t: (a.textContent || '').trim() };
      });
    }
    if (link.closest('.searchResults')) return fromList('.searchResults li .entry-link');
    if (link.closest('.archive-entry')) return fromList('.archive-entry .entry-link');
    if (link.closest('.post-entry, .first-entry')) return fromList('.first-entry .entry-link, .post-entry .entry-link');
    return null;
  }
  document.addEventListener('click', function (e) {
    var a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    if (a.id === 'post-back' || a.closest('.post-nav-arrow') || a.closest('.paginav')) return;
    var list = ctxOf(a);
    if (list && list.length) {
      try {
        sessionStorage.setItem('nav-ctx', JSON.stringify(list));
        sessionStorage.setItem('nav-from', location.pathname + location.search + location.hash);  
      } catch (err) {}
    }
  }, true);

  
  (function () {
    var anchor;
    try { anchor = sessionStorage.getItem('nav-anchor'); } catch (e) { return; }
    if (!anchor) return;
    try { sessionStorage.removeItem('nav-anchor'); } catch (e) {}
    var links = document.querySelectorAll('.entry-link, .series-card-list a');
    for (var i = 0; i < links.length; i++) {
      if (links[i].pathname === anchor) {
        var row = links[i].closest('.post-entry, .first-entry, .archive-entry, .series-card-list li') || links[i];
        row.scrollIntoView({ block: 'center' });
        row.classList.add('nav-return-flash');
        setTimeout(function () { row.classList.remove('nav-return-flash'); }, 1000);
        break;
      }
    }
  })();

  
  if (location.pathname.indexOf('/search') === 0) {
    var sinp = document.getElementById('searchInput');
    var sres = document.getElementById('searchResults');
    if (sinp && sres) {
      sinp.addEventListener('input', function () {
        var v = sinp.value.trim();
        history.replaceState(null, '', v ? (location.pathname + '?query=' + encodeURIComponent(v)) : location.pathname);
      });
      
      sres.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('a.entry-link')) {
          try { sessionStorage.setItem('search-cache', JSON.stringify({ q: sinp.value, html: sres.innerHTML })); } catch (err) {}
        }
      }, true);
      
      var q = new URLSearchParams(location.search).get('query');
      if (q) {
        sinp.value = q;
        var cache = null;
        try { cache = JSON.parse(sessionStorage.getItem('search-cache') || 'null'); } catch (err) {}
        if (cache && cache.q === q && cache.html) {
          sres.innerHTML = cache.html;
        } else {
          var tries = 0;
          var timer = setInterval(function () {
            sinp.dispatchEvent(new Event('input', { bubbles: true }));
            if (sres.children.length || ++tries > 12) clearInterval(timer);
          }, 250);
        }
      }
    }
  }

  
  (function () {
    var nav = document.querySelector('.header-nav');
    var menu = nav && nav.querySelector('#menu');
    if (!nav || !menu || nav.querySelector('.nav-burger')) return;
    var burger = document.createElement('button');
    burger.type = 'button';
    burger.className = 'nav-burger';
    burger.setAttribute('aria-label', '菜单');
    burger.setAttribute('aria-controls', 'menu');
    burger.setAttribute('aria-expanded', 'false');
    burger.innerHTML = '<span></span><span></span><span></span>';
    nav.insertBefore(burger, menu);

    function setOpen(open) {
      nav.classList.toggle('menu-open', open);
      burger.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    burger.addEventListener('click', function (e) {
      e.stopPropagation();
      setOpen(!nav.classList.contains('menu-open'));
    });
    menu.addEventListener('click', function (e) {                 
      if (e.target.closest('a')) setOpen(false);
    });
    document.addEventListener('click', function (e) {             
      if (nav.classList.contains('menu-open') && !nav.contains(e.target)) setOpen(false);
    });
    window.addEventListener('resize', function () {               
      if (window.innerWidth > 768 && nav.classList.contains('menu-open')) setOpen(false);
    });
  })();
})();

<script>
(function () {
   
  var bar = document.createElement('div');
  bar.id = 'reading-progress';
  document.body.appendChild(bar);

  var content = document.querySelector('.post-content');
  var single = document.querySelector('.post-single');

   
  var _p = location.pathname;
  var _isTagTerm = _p.indexOf('/tags/') === 0 && _p !== '/tags/';
  var _isSeriesTerm = _p.indexOf('/series/') === 0 && _p !== '/series/';
   
  var _isArticle = _p.indexOf('/posts/') === 0 && !!single;
  if (_isArticle || _isTagTerm || _isSeriesTerm) {
    var logo = document.querySelector('.header-nav .logo');
    if (logo) {
      var fallback = _isTagTerm ? '/tags/' : _isSeriesTerm ? '/series/' : '/posts/';
      var goBack = function (e) {
        e.preventDefault();
        if (_isArticle) {
          try { sessionStorage.setItem('nav-anchor', location.pathname); } catch (err) {}  
          var navFrom = null;
          try { navFrom = sessionStorage.getItem('nav-from'); } catch (err) {}
          if (matched && navFrom) { location.href = navFrom; return; }   
          var sm = document.querySelector('meta[name="series"]');         
          location.href = (sm && sm.content) ? '/series/#' + encodeURIComponent(sm.content) : '/posts/';
          return;
        }
        location.href = fallback;   
      };
      var logoLink = logo.querySelector('a');               
      var back = document.createElement('a');
      back.id = 'post-back';
      back.href = fallback;
      back.setAttribute('aria-label', '返回');
      back.setAttribute('title', '返回');
      back.innerHTML = '❮';
      back.addEventListener('click', goBack);
      logo.insertBefore(back, logo.firstChild);
      if (logoLink) logoLink.addEventListener('click', goBack);   
    }
  }

   
  if (_isArticle) {
    var here = location.pathname;
    var prev = null, next = null, matched = false;
    try {
      var ctx = JSON.parse(sessionStorage.getItem('nav-ctx') || 'null');
      if (ctx && ctx.length) {
        ctx.forEach(function (o) { if (o && o.t) o.t = o.t.replace(/^post link to\s*/i, ''); });   
        var idx = -1;
        for (var i = 0; i < ctx.length; i++) { if (ctx[i].u === here) { idx = i; break; } }
        if (idx !== -1) {
          matched = true;
          prev = idx > 0 ? ctx[idx - 1] : null;
          next = idx < ctx.length - 1 ? ctx[idx + 1] : null;
        }
      }
    } catch (err) {}

    var paginav = document.querySelector('.paginav');
    if (!matched && paginav) {
      var pp = paginav.querySelector('.prev'), nn = paginav.querySelector('.next');
      prev = pp ? { u: pp.getAttribute('href'), t: '' } : null;
      next = nn ? { u: nn.getAttribute('href'), t: '' } : null;
    }

     
    var meta = document.querySelector('.post-meta');
    if (meta) {
      if (prev) {
        var ap = document.createElement('a');
        ap.className = 'post-nav-arrow prev';
        ap.href = prev.u; ap.title = prev.t || '上一篇';
        ap.setAttribute('aria-label', '上一篇'); ap.innerHTML = '<span class="pn-g">❮</span><span>PREV</span>';
        meta.insertBefore(ap, meta.firstChild);
      }
      if (next) {
        var an = document.createElement('a');
        an.className = 'post-nav-arrow next';
        an.href = next.u; an.title = next.t || '下一篇';
        an.setAttribute('aria-label', '下一篇'); an.innerHTML = '<span>NEXT</span><span class="pn-g">❯</span>';
        meta.appendChild(an);
      }
    }

     
    if (paginav) {
      var setSide = function (cls, item, label) {
        var el = paginav.querySelector('.' + cls);
        if (matched) {
          if (!item) { if (el) el.remove(); return; }
          if (!el) {
            el = document.createElement('a');
            el.className = cls;
            el.innerHTML = '<span class="title"></span><span></span>';
            (cls === 'prev') ? paginav.insertBefore(el, paginav.firstChild) : paginav.appendChild(el);
          }
          el.setAttribute('href', item.u);
          el.querySelector('span:not(.title)').textContent = item.t;
        }
        if (el) { var ti = el.querySelector('.title'); if (ti) ti.textContent = label; }
      };
      setSide('prev', prev, 'PREV');
      setSide('next', next, 'NEXT');
    }
  }

   
  var rows = [];
  if (content) {
    var heads = [].slice.call(content.querySelectorAll('h1[id], h2[id], h3[id], h4[id]'));
    if (heads.length >= 2) {
      var nav = document.createElement('nav');
      nav.id = 'floating-toc';
      nav.setAttribute('aria-label', '目录');
      var rail = document.createElement('div'); rail.className = 'ftoc-rail';
      var panel = document.createElement('div'); panel.className = 'ftoc-panel';

      rows = heads.map(function (h, idx) {
        var lvl = h.tagName.charAt(1);
        var dash = document.createElement('span');
        dash.className = 'ftoc-dash';
        dash.setAttribute('data-level', lvl);
        var item = document.createElement('a');
        item.className = 'ftoc-item';
        item.href = '#' + h.id;
        item.setAttribute('data-level', lvl);
        item.textContent = (h.textContent || '').replace(/#\s*$/, '').trim();
        item.style.setProperty('--i', idx);
        rail.appendChild(dash);
        panel.appendChild(item);
        return { dash: dash, item: item, head: h };
      });

      nav.appendChild(rail);
      nav.appendChild(panel);
      document.body.appendChild(nav);
    }
  }

  var ticking = false;
  function update() {
    ticking = false;

    var docH = document.documentElement.scrollHeight - window.innerHeight;
    var pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;
    bar.style.width = (pct < 0 ? 0 : pct > 100 ? 100 : pct) + '%';

    if (rows.length) {
      var pos = window.scrollY + window.innerHeight * 0.25;
      var cur = 0;
      for (var i = 0; i < rows.length; i++) {
        var top = rows[i].head.getBoundingClientRect().top + window.scrollY;
        if (top - 4 <= pos) cur = i; else break;
      }
      for (var j = 0; j < rows.length; j++) {
        var on = j === cur;
        rows[j].dash.classList.toggle('active', on);
        rows[j].item.classList.toggle('active', on);
      }
    }
  }
  function onScroll() { if (!ticking) { ticking = true; requestAnimationFrame(update); } }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>

            }
        });
    });
