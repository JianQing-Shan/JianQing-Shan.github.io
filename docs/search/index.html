<script>
(function () {
   
  var bar = document.createElement('div');
  bar.id = 'reading-progress';
  document.body.appendChild(bar);

  

  var _p = location.pathname;
  var _isArticle = _p.indexOf('/posts/') === 0 && _p !== '/posts/';
  var _isTagTerm = _p.indexOf('/tags/') === 0 && _p !== '/tags/';
  if (_isArticle || _isTagTerm) {
    var logo = document.querySelector('.header-nav .logo');
    if (logo) {
      var back = document.createElement('a');
      back.id = 'post-back';
      back.href = _isTagTerm ? '/tags/' : '/posts/';
      back.setAttribute('aria-label', '返回');
      back.setAttribute('title', '返回');
      back.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>';
      back.addEventListener('click', function (e) {
        var fromSameSite = document.referrer && new URL(document.referrer).origin === location.origin;
        if (fromSameSite && window.history.length > 1) {
          e.preventDefault();
          window.history.back();
        }
      });
      logo.insertBefore(back, logo.firstChild);
    }
  }

   
  var content = document.querySelector('.post-content');
  var rows = [];
  if (content) {
    var heads = [].slice.call(content.querySelectorAll('h1[id], h2[id], h3[id], h4[id]'));
    if (heads.length >= 2) {
      var nav = document.createElement('nav');
      nav.id = 'floating-toc';
      nav.setAttribute('aria-label', '目录');
      var rail = document.createElement('div'); rail.className = 'ftoc-rail';
      var panel = document.createElement('div'); panel.className = 'ftoc-panel';

      rows = heads.map(function (h, idx) {
        var lvl = h.tagName.charAt(1);
        var dash = document.createElement('span');
        dash.className = 'ftoc-dash';
        dash.setAttribute('data-level', lvl);
        var item = document.createElement('a');
        item.className = 'ftoc-item';
        item.href = '#' + h.id;
        item.setAttribute('data-level', lvl);
        item.textContent = (h.textContent || '').replace(/#\s*$/, '').trim();
        item.style.setProperty('--i', idx);
        rail.appendChild(dash);
        panel.appendChild(item);
        return { dash: dash, item: item, head: h };
      });

      nav.appendChild(rail);
      nav.appendChild(panel);
      document.body.appendChild(nav);
    }
  }

  var ticking = false;
  function update() {
    ticking = false;

    var docH = document.documentElement.scrollHeight - window.innerHeight;
    var pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;
    bar.style.width = (pct < 0 ? 0 : pct > 100 ? 100 : pct) + '%';

    if (rows.length) {
      var pos = window.scrollY + window.innerHeight * 0.25;
      var cur = 0;
      for (var i = 0; i < rows.length; i++) {
        var top = rows[i].head.getBoundingClientRect().top + window.scrollY;
        if (top - 4 <= pos) cur = i; else break;
      }
      for (var j = 0; j < rows.length; j++) {
        var on = j === cur;
        rows[j].dash.classList.toggle('active', on);
        rows[j].item.classList.toggle('active', on);
      }
    }
  }
  function onScroll() { if (!ticking) { ticking = true; requestAnimationFrame(update); } }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>

        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
