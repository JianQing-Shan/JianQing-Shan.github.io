<script>
(function () {
  var master = document.getElementById('series-master');
  if (!master) return;
  var names = [].slice.call(master.querySelectorAll('.series-name-item'));
  var cards = [].slice.call(master.querySelectorAll('.series-card'));
  var active = null;
  function show(key, setHash) {
    active = key;
    cards.forEach(function (c) { c.hidden = c.getAttribute('data-key') !== key; });
    names.forEach(function (n) { n.classList.toggle('active', n.getAttribute('data-key') === key); });
    master.classList.add('is-open');
    if (setHash) history.replaceState(null, '', '#' + encodeURIComponent(key));   
  }
  function hide() {
    active = null;
    master.classList.remove('is-open');
    names.forEach(function (n) { n.classList.remove('active'); });
    history.replaceState(null, '', location.pathname + location.search);          
  }
  names.forEach(function (n) {
    n.addEventListener('click', function () {
      var key = n.getAttribute('data-key');
      if (active === key) hide(); else show(key, true);
    });
  });
  
  var fromHash = decodeURIComponent((location.hash || '').slice(1));
  var hit = fromHash && names.some(function (n) { return n.getAttribute('data-key') === fromHash; });
  if (hit) show(fromHash, false);
  else if (names[0]) show(names[0].getAttribute('data-key'), true);   
})();
</script>

</a><script>
(function () {
  function fromList(sel) {
    return [].map.call(document.querySelectorAll(sel), function (a) {
      return { u: a.pathname, t: (a.getAttribute('aria-label') || a.textContent || '').trim() };
    });
  }
  function ctxOf(link) {
    var card = link.closest && link.closest('.series-card-list');
    if (card) {
      return [].map.call(card.querySelectorAll('li > a'), function (a) {
        return { u: a.pathname, t: (a.textContent || '').trim() };
      });
    }
    if (link.closest('.searchResults')) return fromList('.searchResults li .entry-link');
    if (link.closest('.archive-entry')) return fromList('.archive-entry .entry-link');
    if (link.closest('.post-entry, .first-entry')) return fromList('.first-entry .entry-link, .post-entry .entry-link');
    return null;
  }
  document.addEventListener('click', function (e) {
    var a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    if (a.id === 'post-back' || a.closest('.post-nav-arrow') || a.closest('.paginav')) return;
    var list = ctxOf(a);
    if (list && list.length) {
      try {
        sessionStorage.setItem('nav-ctx', JSON.stringify(list));
        sessionStorage.setItem('nav-from', location.pathname + location.search + location.hash);  
      } catch (err) {}
    }
  }, true);

  
  (function () {
    var anchor;
    try { anchor = sessionStorage.getItem('nav-anchor'); } catch (e) { return; }
    if (!anchor) return;
    try { sessionStorage.removeItem('nav-anchor'); } catch (e) {}
    var links = document.querySelectorAll('.entry-link, .series-card-list a');
    for (var i = 0; i < links.length; i++) {
      if (links[i].pathname === anchor) {
        var row = links[i].closest('.post-entry, .first-entry, .archive-entry, .series-card-list li') || links[i];
        row.scrollIntoView({ block: 'center' });
        row.classList.add('nav-return-flash');
        setTimeout(function () { row.classList.remove('nav-return-flash'); }, 1500);
        break;
      }
    }
  })();

  
  if (location.pathname.indexOf('/search') === 0) {
    var sinp = document.getElementById('searchInput');
    var sres = document.getElementById('searchResults');
    if (sinp && sres) {
      sinp.addEventListener('input', function () {
        var v = sinp.value.trim();
        history.replaceState(null, '', v ? (location.pathname + '?query=' + encodeURIComponent(v)) : location.pathname);
      });
      
      sres.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('a.entry-link')) {
          try { sessionStorage.setItem('search-cache', JSON.stringify({ q: sinp.value, html: sres.innerHTML })); } catch (err) {}
        }
      }, true);
      
      var q = new URLSearchParams(location.search).get('query');
      if (q) {
        sinp.value = q;
        var cache = null;
        try { cache = JSON.parse(sessionStorage.getItem('search-cache') || 'null'); } catch (err) {}
        if (cache && cache.q === q && cache.html) {
          sres.innerHTML = cache.html;
        } else {
          var tries = 0;
          var timer = setInterval(function () {
            sinp.dispatchEvent(new Event('input', { bubbles: true }));
            if (sres.children.length || ++tries > 12) clearInterval(timer);
          }, 250);
        }
      }
    }
  }
})();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>

        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
